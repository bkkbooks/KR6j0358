  - {type: variant, offset: 6942, length: 121, content: '一本奧云：大中九年九月七日珍記。又於同時撿勘之珍記少疑不少。

      八家錄云：行運圓覺加本。然今所校刻之本，奧載智證大師撿勘之記。以之見此，則智證所請來本乎？詳今以淨嚴和上點本及異本，挑燈讐校之，鍥布普天，而以期珊瑚殿上之嘉會耳時。

      元文五上章涒灘十二月朔旦

      　　　　　豐山妙音輪下沙門無等', 甲: '', 丙: ''}
