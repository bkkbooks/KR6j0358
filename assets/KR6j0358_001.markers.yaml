  - {type: variant, offset: 5402, length: 52, content: 大中九年九月五日，於長安城右街龍興寺淨土院雲居禪知房，請左街青龍寺法全阿闍梨本，抄寫并勘定。日本國求法沙門圓珍記, 甲: 寬治六年十一月二十一日奉受, 乙: 嘉永三年三月一日於靜定房書了一校了，以同御本移點了天仁元九月十八日御房奉受了僧林寬之本, 丁: 大唐國青龍寺教本}
